# End-to-end system check against the live staging app.
# Runs the module health check, sidebar navigation, the brand/location matrix,
# the website-search filters, and login/search validation on a schedule, on
# push/PR, and on demand. Results are published as an HTML report + screenshots
# artifact.
name: PMI System E2E

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: # manual trigger from the Actions tab
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: System E2E (chromium)
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Run E2E system check
        env:
          # Configure these in: repo Settings → Secrets and variables → Actions
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASS: ${{ secrets.USER_PASS }}
          # Optional override; falls back to https://stage.app.deepci.com when unset.
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
        run: npx playwright test tests/system-check.spec.ts tests/navigation.spec.ts tests/matrix.spec.ts tests/website-search-filters.spec.ts tests/validation.spec.ts

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 14

      - name: Upload traces & test-results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
